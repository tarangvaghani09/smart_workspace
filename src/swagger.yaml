components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer

  responses:
    BadRequest:
      description: Invalid request
    Unauthorized:
      description: Unauthorized
    Forbidden:
      description: Forbidden
    NotFound:
      description: Not found

  schemas:

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          type: object
          properties:
            id: { type: integer }
            name: { type: string }
            role: { type: string }

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
        - department
      properties:
        name:
          type: string
          example: Alice Johnson
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          format: password
          example: "123456"
        department:
          type: string
          example: Engineering

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
          example: Registration successful
        user:
          type: object
          properties:
            id:
              type: integer
              example: 10
            name:
              type: string
              example: Alice Johnson
            email:
              type: string
              example: alice@example.com

    RoomCreate:
      type: object
      required: [name, type, capacity, creditsPerHour]
      properties:
        name: { type: string }
        type:
          type: string
          enum: [standard, boardroom]
        capacity: { type: integer }
        creditsPerHour: { type: integer }
        location: { type: string }
        amenities: { type: object }

    RoomUpdate:
      type: object
      properties:
        name: { type: string }
        capacity: { type: integer }
        creditsPerHour: { type: integer }

    CreateBooking:
      type: object
      required: [title, startTime, endTime]
      properties:
        title: { type: string }
        roomId: { type: integer, nullable: true }
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        bookingType:
          type: string
          enum: [ONE_TIME, WEEKLY]
        weeks:
          type: integer
        resources:
          type: array
          items:
            type: object
            properties:
              resourceId: { type: integer }
              quantity: { type: integer }

    ApproveBooking:
      type: object
      required: [bookingId, action]
      properties:
        bookingId: { type: integer }
        action:
          type: string
          enum: [APPROVE, REJECT]

    ResourceCreate:
      type: object
      required: [name, quantity]
      properties:
        name: { type: string }
        quantity: { type: integer }

    SearchRooms:
      type: object
      properties:
        capacity:  
          type: integer 
          example: 1
        # features:
        #   type: array
        #   items: { type: string }
        date:
          type: string
          format: date
          example: "2026-01-24"
        startTime:
          type: string
          example: "11:11 AM"
        endTime:
          type: string
          example: "12:00 PM"
        timezone:
          type: string
          example: "Asia/Kolkata"

