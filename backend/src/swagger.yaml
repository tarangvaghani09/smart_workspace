  #     tags: [Approvals]
  #     summary: Approve or reject booking
  #     requestBody:
  #       required: true
  #       content:
  #         application/json:
  #           schema:
  #             $ref: '#/components/schemas/ApproveBooking'
  #     responses:
  #       200:
  #         description: Booking approved / rejected

  /credits:
    get:
      tags: [Credits / Department]
      summary: Get department credits
      security:
        - bearerAuth: []
      responses:
        200:
          description: Credit balance

  # /getDepartmentDetails:
  #   get:
  #     tags: [Credits / Department]
  #     summary: Get department details
  #     responses:
  #       200:
  #         description: Get Department Details

  /search/rooms:
    post:
      tags: [Search]
      summary: Search available rooms
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRooms'
      responses:
        200:
          description: Matching rooms

  /rooms:
    post:
      tags: [Admin]
      summary: Create room
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomCreate'
      responses:
        201:
          description: Room created
        403:
          $ref: '#/components/responses/Forbidden'

  /rooms/{id}:
    put:
      tags: [Admin]
      summary: Update room
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomUpdate'
      responses:
        200:
          description: Room updated
    delete:
      tags: [Admin]
      summary: Delete room
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        200:
          description: Room deleted
        400:
          description: Room has future bookings

  /rooms/{id}/status:
    patch:
      tags: [Admin]
      summary: Toggle Room Status
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        200:
          description: Toggle Room Status

  /approvals/pending:
    get:
      tags: [Admin]
      summary: List pending bookings
      security:
        - bearerAuth: []
      responses:
        200:
          description: Pending bookings

  /approve-booking:
    post:
      tags: [Admin]
      summary: Approve or reject booking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveBooking'
      responses:
        200:
          description: Booking approved / rejected

  /bookings/department:
    get:
      tags: [Admin]
      summary: List bookings by department
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: departmentId
          required: true
          schema:
            type: integer
          description: Department ID
      responses:
        200:
          description: List of bookings for department

  /listAllResources:
    get:
      tags: [Admin]
      summary: List all resources (active & inactive)
      description: Admin only
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of all resources

  /resources:
    get:
      tags: [Resources]
      summary: List resources
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of devices

    post:
      tags: [Admin]
      summary: Create resource (Admin)
      description: Create a new bookable resource with credit cost per hour
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceCreate'
      responses:
        201:
          description: Resource created
        400:
          description: Validation failed
        409:
          description: Resource with this name already exists
        403:
          $ref: '#/components/responses/Forbidden'

  /resources/{id}:
    patch:
      tags: [Admin]
      summary: Update resource
      description: Update resource name, quantity, or credit cost per hour
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceUpdate'
      responses:
        200:
          description: Resource updated
        400:
          description: Validation failed
        404:
          description: Resource not found
        409:
          description: Resource with this name already exists
        403:
          $ref: '#/components/responses/Forbidden'

    delete:
      tags: [Admin]
      summary: Delete resource
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        200:
          description: Resource deleted

  /resources/{id}/status:
    patch:
      tags: [Admin]
      summary: Toggle Resource Status
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        200:
          description: Toggle Resource Status

