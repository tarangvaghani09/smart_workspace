components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer

  responses:
    BadRequest:
      description: Invalid request
    Unauthorized:
      description: Unauthorized
    Forbidden:
      description: Forbidden
    NotFound:
      description: Not found

  schemas:

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          type: object
          properties:
            id: { type: integer }
            name: { type: string }

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
        - departmentId
      properties:
        name:
          type: string
          example: Alice Johnson
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          format: password
          example: "Alice@123"
        departmentId:
          type: integer
          example: 1

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: alice@example.com

    ResetPasswordRequest:
      type: object
      required: [token, newPassword, confirmNewPassword]
      properties:
        token:
          type: string
          example: 9f43d5a20e3d4f78a6f4...
        newPassword:
          type: string
          format: password
          example: New@1234
        confirmNewPassword:
          type: string
          format: password
          example: New@1234

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
          example: Registration successful
        user:
          type: object
          properties:
            id:
              type: integer
              example: 10
            name:
              type: string
              example: Alice Johnson
            email:
              type: string
              example: alice@example.com

    MeResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Alice Admin
        email:
          type: string
          example: alice@example.com
        role:
          type: string
          example: admin
        departmentId:
          type: integer
          nullable: true
          example: 1
        department:
          nullable: true
          type: object
          properties:
            id:
              type: integer
              example: 1
            name:
              type: string
              example: Engineering

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Password changed successfully

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Validation failed
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
        - confirmNewPassword
      properties:
        currentPassword:
          type: string
          format: password
          example: Old@1234
        newPassword:
          type: string
          format: password
          description: Must contain uppercase, lowercase, number, and special character
          example: New@1234
        confirmNewPassword:
          type: string
          format: password
          example: New@1234

    RoomCreate:
      type: object
      required: [name, type, capacity, creditsPerHour]
      properties:
        name: { type: string }
        type:
          type: string
          enum: [standard, boardroom]
        capacity: { type: integer }
        creditsPerHour: { type: integer }

    RoomUpdate:
      type: object
      properties:
        name: { type: string }
        capacity: { type: integer }
        creditsPerHour: { type: integer }

    CreateBooking:
      type: object
      required:
        - title
        - startTime
        - endTime
      properties:
        title:
          type: string
          example: Team Sync Meeting

        roomId:
          type: integer
          nullable: true
          example: 3

        resources:
          type: array
          items:
            type: object
            required: [resourceId]
            properties:
              resourceId:
                type: integer
                example: 5
              quantity:
                type: integer
                minimum: 1
                default: 1

        startTime:
          type: string
          description: Start time in IST (AM/PM format)
          example: "2026-02-10T10:00 AM"

        endTime:
          type: string
          description: End time in IST (AM/PM format)
          example: "2026-02-10T11:00 AM"

        recurrenceType:
          type: string
          enum: [ONE_TIME, WEEKLY]
          default: ONE_TIME

        weeks:
          type: integer
          minimum: 1
          example: 4
          description: Required only when recurrenceType is WEEKLY

    resources:
      type: array
      items:
        type: object
        required: [resourceId]
        properties:
          resourceId:
            type: integer
            example: 5
          quantity:
            type: integer
            minimum: 1
            default: 1

    ApproveBooking:
      type: object
      required: [bookingId, action]
      properties:
        bookingId: { type: integer }
        action:
          type: string
          enum: [APPROVE, REJECT]

    ResourceCreate:
      type: object
      required:
        - name
        - quantity
        - creditsPerHour
      properties:
        name:
          type: string
          example: Projector
        quantity:
          type: integer
          minimum: 1
          example: 5
        creditsPerHour:
          type: integer
          minimum: 1
          example: 10

    ResourceUpdate:
      type: object
      properties:
        name:
          type: string
          example: Wireless Projector
        quantity:
          type: integer
          minimum: 1
          example: 10
        creditsPerHour:
          type: integer
          minimum: 1
          example: 20

    SearchRooms:
      type: object
      properties:
        capacity:  
          type: integer 
          example: 1
        # features:
        #   type: array
        #   items: { type: string }
        date:
          type: string
          format: date
          example: "2026-01-24"
        startTime:
          type: string
          example: "11:11 AM"
        endTime:
          type: string
          example: "12:00 PM"
        timezone:
          type: string
          example: "Asia/Kolkata"

