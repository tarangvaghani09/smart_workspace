openapi: 3.0.3
info:
  title: Workspace Booking API
  description: >
    Production API for room & device booking with credits,
    approvals, recurring bookings, and resource management.
  version: 1.0.0
  contact:
    name: Backend Team
    email: backend@company.com

servers:
  - url: http://192.168.5.91:3000/api
    description: Local
  - url: https://api.company.com
    description: Production

security:
  - bearerAuth: []

tags:
  - name: Auth
  - name: Bookings
  - name: Credits / Department
  - name: Search
  - name: Resources
  - name: Admin

paths:

  /register:
    post:
      tags: [Auth]
      summary: Register new user
      description: Create a new user account with department assignment
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        201:
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        400:
          description: Validation error / Email already exists
        500:
          description: Server error

  /login:
    post:
      tags: [Auth]
      summary: Login user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        401:
          $ref: '#/components/responses/Unauthorized'

  /me:
    get:
      tags: [Auth]
      summary: Get logged-in user profile
      description: Returns authenticated user details with optional department
      security:
        - bearerAuth: []
      responses:
        200:
          description: User profile fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        401:
          $ref: '#/components/responses/Unauthorized'
        404:
          description: User not found
        500:
          description: Server error

  /change-password:
    patch:
      tags: [Auth]
      summary: Change password (authenticated user)
      description: Update account password using current password verification
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        200:
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        400:
          description: Validation failed or current password is incorrect
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/MessageResponse'
        401:
          $ref: '#/components/responses/Unauthorized'

  /forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset
      description: Sends password reset link/token to email if account exists.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        200:
          description: Neutral success response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        400:
          description: Validation failed

  /reset-password:
    post:
      tags: [Auth]
      summary: Reset password using token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        200:
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        400:
          description: Invalid/expired token or validation failed
        404:
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /bookings:
    post:
      tags: [Bookings]
      summary: Create booking (room / resource / both)
      description: >
        Creates a booking using local time in Asia/Kolkata.
        Backend stores all times in UTC automatically.
        Bookings allowed only between 9:00 AM and 5:00 PM IST.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBooking'
      responses:
        200:
          description: Booking created successfully
        400:
          description: Validation or availability error
        401:
          $ref: '#/components/responses/Unauthorized'

    get:
      tags: [Bookings]
      summary: List user bookings
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of bookings

  /departments:
    get:
      tags: [Bookings]
      summary: List all departments
      security: []
      responses:
        200:
          description: Show all departments

  /bookings/{id}:
    get:
      tags: [Bookings]
      summary: Get booking by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        200:
          description: Booking details
        404:
          $ref: '#/components/responses/NotFound'

  /bookings/{id}/check-in:
    post:
      tags: [Bookings]
      summary: Check-in booking
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        200:
          description: Checked in

  /bookings/{id}/check-out:
    post:
      tags: [Bookings]
      summary: Check-out booking
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        200:
          description: Checked out

  /bookings/{id}/cancel:
    post:
      tags: [Bookings]
      summary: Cancel booking
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        200:
          description: Booking cancelled

  # /approvals/pending:
  #   get:
  #     tags: [Approvals]
  #     summary: List pending bookings (Admin)
  #     responses:
  #       200:
  #         description: Pending bookings

  # /approve-booking:
