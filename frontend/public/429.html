<!DOCTYPE html>
<html>
<head>
  <title>Too Many Requests</title>
  <style>
    body {
      font-family: Arial;
      background: #f9fafb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: white;
      padding: 40px;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,.1);
      text-align: center;
    }
    h1 { color: #dc2626; }
  </style>
</head>
<body>
  <div class="box">
    <h1>🚫 Too Many Requests</h1>
    <p id="msg"></p>

    <a id="back" href="/" style="pointer-events:none;opacity:.5">
      Go back to login
    </a>
  </div>

<script>
const params = new URLSearchParams(window.location.search);
let s = parseInt(params.get("retry")) || 900;

const msg = document.getElementById("msg");

function format(t) {
  const m = Math.floor(t / 60);
  const sec = t % 60;
  return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
}

msg.textContent = `Please wait ${format(s)}.`;

const timer = setInterval(() => {
  s--;
  msg.textContent = `Please wait ${format(s)}.`;

  if (s <= 0) {
    clearInterval(timer);
    window.location.href = "/";
  }
}, 1000);
</script>
</body>
</html>
