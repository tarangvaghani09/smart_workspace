<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Too Many Requests</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            text-align: center;
            padding-top: 100px;
        }
        .box {
            background: #ffffff;
            padding: 30px;
            margin: auto;
            width: 420px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #d9534f;
        }
        p {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Too Many Requests</h1>
        <p>You have exceeded the allowed request limit.</p>
        <p>Please wait <strong>5 minutes</strong> and try again.</p>
        <p>If you believe this is a mistake, contact the administrator.</p>
    </div>
</body>
</html>
