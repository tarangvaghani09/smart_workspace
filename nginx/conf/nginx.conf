worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;


    server {
        listen 443 ssl;
        http2 on;
        server_name localhost;

        ssl_certificate ssl/cert.pem;
        ssl_certificate_key ssl/key.pem;

        # API → Node
location /api/ {
    limit_req zone=api_limit burst=40;
    limit_req_status 429;
    add_header Retry-After 60 always; 
    add_header X-Rate-Limit-By "nginx" always;

    add_header Access-Control-Expose-Headers "Retry-After, X-Rate-Limit-By" always;

    proxy_pass http://127.0.0.1:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

error_page 429 /429.html;

location = /429.html {
    alias C:/nginx-1.28.0/html/429.html;
}

        # Frontend → Vite
        location / {
            proxy_pass https://127.0.0.1:5173;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }

    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }
}